name: TodoApp
options:
  bundleIdPrefix: com.d0ne1s
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

targets:
  TodoApp:
    type: application
    platform: iOS
    sources:
      - Sources
    dependencies:
      - target: TodoWidgetExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.d0ne1s.todoapp
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: DEVELOPMENT_TEAM_PLACEHOLDER
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"

  TodoWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: Widget
        excludes:
          - Info.plist
      - path: Sources/Theme.swift
    info:
      path: Widget/Info.plist
      properties:
        CFBundleDisplayName: TodoWidget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.d0ne1s.todoapp.widget
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: DEVELOPMENT_TEAM_PLACEHOLDER
