name: TodoMac
options:
  bundleIdPrefix: com.d0ne1s
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"

targets:
  TodoMac:
    type: application
    platform: macOS
    sources:
      - Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.d0ne1s.todomac
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: ""
        GENERATE_INFOPLIST_FILE: true
